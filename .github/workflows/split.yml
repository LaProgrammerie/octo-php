name: Split monorepo

on:
  push:
    branches: ["main"]
    tags: ["*"]

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: packages/runtime-pack
            repo: LaProgrammerie/octo-php-runtime-pack
          - prefix: packages/symfony-bridge
            repo: LaProgrammerie/octo-php-symfony-bridge
          - prefix: packages/symfony-bridge-full
            repo: LaProgrammerie/octo-php-symfony-bridge-full
          - prefix: packages/symfony-bundle
            repo: LaProgrammerie/octo-php-symfony-bundle
          - prefix: packages/symfony-messenger
            repo: LaProgrammerie/octo-php-symfony-messenger
          - prefix: packages/symfony-otel
            repo: LaProgrammerie/octo-php-symfony-otel
          - prefix: packages/symfony-realtime
            repo: LaProgrammerie/octo-php-symfony-realtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Build & install libgit2 v1.5.0 (for git2go/v34)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libssl-dev zlib1g-dev libssh2-1-dev ca-certificates

          LIBGIT2_DIR="${RUNNER_TEMP}/libgit2-1.5.0"
          mkdir -p "${LIBGIT2_DIR}"

          git clone --depth 1 --branch v1.5.0 https://github.com/libgit2/libgit2.git "${RUNNER_TEMP}/libgit2-src"
          cmake -S "${RUNNER_TEMP}/libgit2-src" -B "${RUNNER_TEMP}/libgit2-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${LIBGIT2_DIR}" \
            -DBUILD_SHARED_LIBS=ON \
            -DUSE_SSH=ON
          cmake --build "${RUNNER_TEMP}/libgit2-build" --parallel
          cmake --install "${RUNNER_TEMP}/libgit2-build"

          # Make pkg-config + dynamic linker see this libgit2 first
          echo "PKG_CONFIG_PATH=${LIBGIT2_DIR}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${LIBGIT2_DIR}/lib" >> "$GITHUB_ENV"

      - name: Build splitsh-lite v2.0.0 (linked against libgit2 v1.5.0)
        run: |
          set -euo pipefail

          git clone --depth 1 --branch v2.0.0 https://github.com/splitsh/lite "${RUNNER_TEMP}/splitsh-lite-src"
          cd "${RUNNER_TEMP}/splitsh-lite-src"

          mkdir -p "${GITHUB_WORKSPACE}/bin"

          # CGO must be enabled because git2go links to libgit2
          CGO_ENABLED=1 go build -o "${GITHUB_WORKSPACE}/bin/splitsh-lite" .

          chmod +x "${GITHUB_WORKSPACE}/bin/splitsh-lite"
          echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"

          splitsh-lite --help >/dev/null

      - name: Split & push
        env:
          GH_TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          PREFIX="${{ matrix.prefix }}"
          REPO="${{ matrix.repo }}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          echo "Splitting ${PREFIX} -> ${REPO}"
          SHA="$(splitsh-lite --prefix="${PREFIX}")"
          echo "Split SHA: ${SHA}"

          # Push branch
          git push --force "${REMOTE}" "${SHA}:refs/heads/main"

          # If this workflow was triggered by a tag, also push the tag to the split repo
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "Pushing tag ${TAG} -> ${REPO}"
            git push --force "${REMOTE}" "${SHA}:refs/tags/${TAG}"
          fi