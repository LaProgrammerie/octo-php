name: Split monorepo

on:
  push:
    branches: ["main"]
    tags: ["*"]

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: packages/runtime-pack
            repo: LaProgrammerie/octo-php-runtime-pack
          - prefix: packages/symfony-bridge
            repo: LaProgrammerie/octo-php-symfony-bridge
          - prefix: packages/symfony-bridge-full
            repo: LaProgrammerie/octo-php-symfony-bridge-full
          - prefix: packages/symfony-bundle
            repo: LaProgrammerie/octo-php-symfony-bundle
          - prefix: packages/symfony-messenger
            repo: LaProgrammerie/octo-php-symfony-messenger
          - prefix: packages/symfony-otel
            repo: LaProgrammerie/octo-php-symfony-otel
          - prefix: packages/symfony-realtime
            repo: LaProgrammerie/octo-php-symfony-realtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install splitsh-lite
        run: |
          set -euo pipefail
          go env -w GOBIN="${GITHUB_WORKSPACE}/bin"
          mkdir -p "${GITHUB_WORKSPACE}/bin"
          # Hypothèse: le binaire est dans cmd/splitsh-lite (classique en Go)
          go install github.com/splitsh/lite/cmd/splitsh-lite@v2.0.0
          echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"
          splitsh-lite --help

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Split & push
        env:
          GH_TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          PREFIX="${{ matrix.prefix }}"
          REPO="${{ matrix.repo }}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          echo "Splitting ${PREFIX} -> ${REPO}"
          SHA="$(splitsh-lite --prefix="${PREFIX}")"
          echo "Split SHA: ${SHA}"

          # Push branch
          git push --force "${REMOTE}" "${SHA}:refs/heads/main"

          # If this workflow was triggered by a tag, also push the tag to the split repo
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "Pushing tag ${TAG} -> ${REPO}"
            git push --force "${REMOTE}" "${SHA}:refs/tags/${TAG}"
          fi