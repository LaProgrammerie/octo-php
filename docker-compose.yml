# =============================================================================
# Async PHP Platform — Development Stack
# =============================================================================
# Usage:
#   docker compose up              — Start dev server on port 8080
#   docker compose up -d           — Start in background
#   docker compose down            — Stop and remove containers
#   docker compose build           — Rebuild the image
#
# Quality (run once, exit):
#   docker compose run --rm app composer lint       — CS Fixer dry-run
#   docker compose run --rm app composer lint:fix   — CS Fixer auto-fix
#   docker compose run --rm app composer analyse    — PHPStan
#   docker compose run --rm app composer test       — PHPUnit
#   docker compose run --rm app composer quality    — All of the above
#
# The app service uses the "dev" stage (Composer + Xdebug available).
# Source code is bind-mounted for live reload during development.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - .:/app
      - vendor-data:/app/vendor
    environment:
      - APP_HOST=${APP_HOST:-0.0.0.0}
      - APP_PORT=8080
      - APP_WORKERS=${APP_WORKERS:-2}
      - APP_ENV=${APP_ENV:-dev}
    restart: unless-stopped

  debug:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-xdebug
    volumes:
      - .:/app
      - vendor-data:/app/vendor
    environment:
      - XDEBUG_MODE=${XDEBUG_MODE:-debug}
      - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003
    command: ["php", "-v"]

volumes:
  vendor-data:
